name: hammerspoon-nix
version: 1.0.0
description: Home-manager module and personal Lua config for Hammerspoon macOS automation
author: DivitMittal
license: MIT
target: all
type: instructions

dependencies:
  mcp:
    - name: serena
      registry: false
      transport: stdio
      command: uvx
      args:
        - --from
        - git+https://github.com/oraios/serena
        - serena
        - start-mcp-server
        - --context
        - claude-code
        - --project
        - ~/Projects/Cfgs/hammerspoon-nix/
